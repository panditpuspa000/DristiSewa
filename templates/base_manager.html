<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: #1e3a8a;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 12px 0;
        }

        .logout {
            background: yellow;
            color: black;
            padding: 5px;
            display: inline-block;
            margin-top: 20px;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 20px;
            background: #f3f4f6;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 15px;
        }

        .card {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            color: white;
        }

        .green { background: green; }
        .yellow { background: goldenrod; }
        .red { background: crimson; }

        /* TABLE */
        table {
            width: 100%;
            margin-top: 20px;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        .btn {
            padding: 5px 10px;
            background: blue;
            color: white;
            border: none;
        }

        .verified {
            background: green;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Manager Panel</h2>

    <a href="#">Dashboard</a>
    <a href="#">Front-desk Users</a>
    <a href="#">Branch Monitoring</a>
    <a href="#">Followup Management</a>
    <a href="#">Reports & Analytics</a>

    <div style="margin-top:50px;">
        <p>Sushil Regmi</p>
        <a class="logout" href="/accounts/logout/">Logout</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
